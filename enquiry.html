<body>

<header>
  <nav class="navbar">
    <div class="logo">Goose Goose Duck Store</div>
    <!--Three lines (harmburger icon)-->
      <button class="menu-toggle">&#9776;</button>
    <ul class="nav-links">

<section class="enquiry">
  <h1>Enquiry Form</h1>
  <p>Interested in becoming a sponsor, volunteer, or just want to ask us something? Fill out the form below.</p>

  <form id="enquiryForm">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" required minlength="2">

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" required>

    <label for="enquiryType">Enquiry Type:</label>
    <select id="enquiryType" name="enquiryType" required>
      <option value="">Select....</option>
      <option value="sponsor">Sponsorship</option>
      <option value="volunteer">Volunteering</option>
      <option value="general">General Enquiry</option>
    </select>

    <label for="details">Details:</label>
    <textarea id="details" name="details" rows="5" required></textarea>

    <button type="submit" class="btn">Submit Enquiry</button>
  </form>
</section>
