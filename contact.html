  <!-- Basic SEO Meta Tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Title and Description -->
<title>Goose Goose Duck Store | Fun Kids Merchandise</title>
<meta name="description" content="Goose Goose Duck Store offers playful merchandise created by childhood friends. Shop plush toys, t-shirts, mugs, and more in Cape Town.">

<!-- Keywords -->
<meta name="keywords" content="Goose Goose Duck Store, kids merchandise, plush toys, t-shirts, mugs, Cape Town store">

<!-- Author -->
<meta name="author" content="Emihle">

<!--Robots and canonical-->
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://goosegooseduckstore.com/contact.html">

<!-- Open Graph for Social Media -->
<meta property="og:title" content="Goose Goose Duck Store">
<meta property="og:description" content="Fun little merchandise created by childhood friends.">
<meta property="og:image" content="images/logo.png">
<meta property="og:url" content="https://goosegooseduckstore.com">

<!-- Mobile Friendly -->
<meta name="theme-color" content="#008080">
</head>
<body>

  <!-- Header & Navigation -->
  <header>
    <nav class="navbar">
      <div class="logo">Goose Goose Duck Store</div>
      <!--Three lines (harmburger icon)-->
        <button class="menu-toggle">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Products</a></li>

        <li><a href="contact.html">Contact</a></li>
        <li><a href="enquiry.html">Enquiry</a></li>
      </ul>
    </nav>
  </header>

  <!-- Contact Section -->
  <section class="contact">

    <h1>Contact Us</h1>
    <p>We’d love to hear from you! Fill out the form below and we’ll get back to you soon.</p>

    <form id="contactForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn">Send Message *</button>
    </form>
  </section>

  <!-- Map-->
  <section class="map">
    <h2>Our Location</h2>
    <iframe 
      src = "https://www.google.com/maps/embed?pd=!1m18!1m12!1m3!1d3310.731....etc"
      width="100%" height="300"style="border:0;"allowfullscreen=""loading="lazy">
    </iframe>
  </section>

  <!-- Footer -->
  <footer>

  </footer>
